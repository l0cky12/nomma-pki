---
- name: Create public artifacts directory
  ansible.builtin.file:
    path: "{{ root_ca_artifacts_dir }}"
    state: directory
    mode: "0755"

- name: Export Root CA public certificate
  ansible.builtin.copy:
    src: "{{ root_ca_cert_path }}"
    dest: "{{ root_ca_artifacts_dir }}/nomma-root-ca.cert.pem"
    mode: "0644"

- name: Export signed Issuing CA public certificate
  ansible.builtin.copy:
    src: "{{ issuing_ca_cert_path }}"
    dest: "{{ root_ca_artifacts_dir }}/nomma-issuing-ca.cert.pem"
    mode: "0644"

- name: Export public CA chain
  ansible.builtin.copy:
    src: "{{ ca_chain_path }}"
    dest: "{{ root_ca_artifacts_dir }}/nomma-ca-chain.cert.pem"
    mode: "0644"

- name: Write public artifact manifest
  ansible.builtin.copy:
    dest: "{{ root_ca_artifacts_dir }}/MANIFEST.txt"
    mode: "0644"
    content: |
      NOMMA PKI public transfer artifacts
      Generated by root-ca/playbooks/site.yml

      Transfer these files to the online Issuing CA project:
      - nomma-root-ca.cert.pem
      - nomma-issuing-ca.cert.pem
      - nomma-ca-chain.cert.pem

      Never transfer or commit:
      - {{ root_ca_key_path }}
      - {{ issuing_ca_key_path }}
      - vault.yml
      - vault password files
