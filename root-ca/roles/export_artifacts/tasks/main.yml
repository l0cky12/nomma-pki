---
- name: Create remote public artifacts directory
  ansible.builtin.file:
    path: "{{ root_ca_remote_export_dir }}"
    state: directory
    mode: "0755"

- name: Stage Root CA public certificate on remote host
  ansible.builtin.copy:
    src: "{{ root_ca_cert_path }}"
    dest: "{{ root_ca_remote_export_dir }}/nomma-root-ca.cert.pem"
    remote_src: true
    mode: "0644"

- name: Stage signed Issuing CA public certificate on remote host
  ansible.builtin.copy:
    src: "{{ issuing_ca_cert_path }}"
    dest: "{{ root_ca_remote_export_dir }}/nomma-issuing-ca.cert.pem"
    remote_src: true
    mode: "0644"

- name: Stage public CA chain on remote host
  ansible.builtin.copy:
    src: "{{ ca_chain_path }}"
    dest: "{{ root_ca_remote_export_dir }}/nomma-ca-chain.cert.pem"
    remote_src: true
    mode: "0644"

- name: Write public artifact manifest on remote host
  ansible.builtin.copy:
    dest: "{{ root_ca_remote_export_dir }}/MANIFEST.txt"
    mode: "0644"
    content: |
      NOMMA PKI public transfer artifacts
      Generated by root-ca/playbooks/site.yml

      Transfer these files to the online Issuing CA project:
      - nomma-root-ca.cert.pem
      - nomma-issuing-ca.cert.pem
      - nomma-ca-chain.cert.pem

      Never transfer or commit:
      - {{ root_ca_key_path }}
      - {{ issuing_ca_key_path }}
      - vault.yml
      - vault password files

- name: Create local public artifacts directory on control node
  ansible.builtin.file:
    path: "{{ root_ca_artifacts_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  connection: local
  become: false

- name: Fetch public artifacts back to control node
  ansible.builtin.fetch:
    src: "{{ root_ca_remote_export_dir }}/{{ item }}"
    dest: "{{ root_ca_artifacts_dir }}/{{ item }}"
    flat: true
  loop:
    - nomma-root-ca.cert.pem
    - nomma-issuing-ca.cert.pem
    - nomma-ca-chain.cert.pem
    - MANIFEST.txt
