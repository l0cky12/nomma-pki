---
# NOMMA Issuing CA Inventory
#
# The Issuing CA is an ONLINE system — it must be reachable 24/7
# for certificate issuance, revocation, and CRL/OCSP publishing.
#
# Security note: this host holds the Intermediate CA private key.
# Treat it as a high-value target:
#   - Dedicated host or hardened VM
#   - Minimal installed software
#   - Strict firewall (SSH + HTTPS only)
#   - No direct internet exposure without reverse proxy

all:
  children:
    issuing_ca:
      hosts:
        NOMMA-ISSUINGCA01:
          # Set this to the actual IP or hostname of your Issuing CA server
          ansible_host: 10.1.2.98
          ansible_user: ldecareaux
          ansible_become: true
