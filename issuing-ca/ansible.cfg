[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = ansible.builtin.default
callback_result_format = yaml
interpreter_python = auto_silent

# Enforce that vars with "vault" in the name must come from an
# encrypted file — prevents accidentally committing plaintext secrets.
vault_identity_list = ~/.ansible/vault-password.txt

# Increase connection timeouts for slow networks
timeout = 30

# Show task path on failure for debugging
display_args_to_stdout = True

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
# Debian 13 ships modern SSH — enable pipelining for speed
pipelining = True
# Disable SSH agent forwarding by default (security best practice)
ssh_args = -o ForwardAgent=no -o ControlMaster=auto -o ControlPersist=60s
